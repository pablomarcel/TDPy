# .github/workflows/pages.yml
name: Build & Publish Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: "3.11"
      SPHINX_VERSION: "8.2.3"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install project + docs dependencies
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip setuptools wheel

          # TDPy is a simpler root-layout project, not a multi-package docs
          # portal like robotics/control-systems/digital-control/gearsets.
          #
          # Prefer pyproject.toml as the source of truth and use the docs extra,
          # which should pin Sphinx to 8.2.3.
          if [ -f pyproject.toml ]; then
            python -m pip install -e ".[docs]"
          else
            # Fallback for repos without pyproject.toml. Do not let an old or
            # incompatible requirements.txt Sphinx pin break the Pages build.
            if [ -f requirements.txt ]; then
              grep -viE '^(sphinx|furo|alabaster|docutils|snowballstemmer)([=<>!~ ]|$)' requirements.txt > /tmp/tdpy-runtime-requirements.txt || true
              if [ -s /tmp/tdpy-runtime-requirements.txt ]; then
                python -m pip install -r /tmp/tdpy-runtime-requirements.txt
              fi
            fi
            python -m pip install "sphinx==${SPHINX_VERSION}" furo
          fi

          # Belt-and-suspenders: keep the deploy-safe Sphinx version even if
          # another dependency attempted to move it.
          python -m pip install --upgrade --force-reinstall "sphinx==${SPHINX_VERSION}" furo

          python - <<'PY'
          import sphinx
          print("Sphinx version:", sphinx.__version__)
          PY
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1

      - name: Ensure root Sphinx docs exist
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p docs/_static docs/_templates
          touch docs/_static/.gitkeep docs/_templates/.gitkeep

          # Root-layout import path:
          #   docs/conf.py -> docs -> repository root
          if [ ! -f docs/conf.py ]; then
            cat > docs/conf.py <<'PY'
          # Generated by .github/workflows/pages.yml for TDPy
          from __future__ import annotations

          import sys
          from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]
          sys.path.insert(0, str(ROOT))

          project = "TDPy"
          author = "Pablo Marcel Montijo"

          extensions = [
              "sphinx.ext.autodoc",
              "sphinx.ext.napoleon",
              "sphinx.ext.viewcode",
          ]

          templates_path = ["_templates"]
          exclude_patterns = ["_build", "Thumbs.db", ".DS_Store"]
          html_theme = "furo"
          html_static_path = ["_static"]

          autodoc_typehints = "description"
          autodoc_mock_imports = [
              "CoolProp",
              "CoolProp.CoolProp",
              "cantera",
              "dearpygui",
              "dearpygui.dearpygui",
              "gekko",
              "matplotlib",
              "matplotlib.pyplot",
              "numpy",
              "pandas",
              "plotly",
              "plotly.graph_objects",
              "scipy",
              "scipy.optimize",
              "scipy.interpolate",
              "scipy.linalg",
              "sympy",
              "yaml",
              "pyfiglet",
          ]

          napoleon_google_docstring = True
          napoleon_numpy_docstring = True
          PY
          fi

          if [ ! -f docs/index.rst ]; then
            cat > docs/index.rst <<'RST'
          TDPy Documentation
          ==================

          TDPy is a Python-first engineering toolkit for thermodynamics,
          property evaluation, nonlinear equation solving, optimization, and
          EES-style engineering workflows.

          .. toctree::
             :maxdepth: 2
             :caption: Contents:

             api
          RST
          fi

          if [ ! -f docs/api.rst ]; then
            cat > docs/api.rst <<'RST'
          API Reference
          =============

          Application Layer
          -----------------

          .. automodule:: cli
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: app
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: apis
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: design
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: core
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: in_out
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: units
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: utils
             :members:
             :undoc-members:
             :show-inheritance:

          Equations Package
          -----------------

          .. automodule:: equations.api
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: equations.solver
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: equations.optimizer
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: equations.safe_eval
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: equations.spec
             :members:
             :undoc-members:
             :show-inheritance:

          Interpreter Package
          -------------------

          .. automodule:: interpreter.cli
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: interpreter.api
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: interpreter.build_spec
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: interpreter.intent
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: interpreter.models
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: interpreter.numeric_eval
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: interpreter.parse
             :members:
             :undoc-members:
             :show-inheritance:

          Thermo Props Package
          --------------------

          .. automodule:: thermo_props.api
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: thermo_props.core
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: thermo_props.state
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: thermo_props.coolprop_backend
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: thermo_props.cantera_backend
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: thermo_props.librh2o_ashrae_backend
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: thermo_props.nh3h2o_backend
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: thermo_props.ammonia_water
             :members:
             :undoc-members:
             :show-inheritance:

          GUI Modules
          -----------

          .. automodule:: gui_core_dpg
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: gui_log_dpg
             :members:
             :undoc-members:
             :show-inheritance:

          .. automodule:: gui_utils_dpg
             :members:
             :undoc-members:
             :show-inheritance:
          RST
          fi

          if [ ! -f docs/Makefile ]; then
            cat > docs/Makefile <<'MAKE'
          # Minimal Sphinx Makefile
          .PHONY: html clean
          html:
          	+sphinx-build -b html . _build/html
          clean:
          	+rm -rf _build
          MAKE
          fi

      - name: Build Sphinx documentation
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail

          echo "==> Building root TDPy docs"
          if [ -f docs/Makefile ]; then
            make -C docs html || sphinx-build -b html -W --keep-going docs docs/_build/html
          else
            sphinx-build -b html -W --keep-going docs docs/_build/html
          fi

      - name: Assemble site folder
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d docs/_build/html ]; then
            echo "docs/_build/html was not created."
            exit 1
          fi

          mkdir -p _site
          touch _site/.nojekyll
          cp -R docs/_build/html/* _site/

          # Add a small project landing file for traceability without replacing
          # Sphinx's generated index.html.
          cat > _site/project.json <<'JSON'
          {
            "project": "TDPy",
            "docs_layout": "single-root-sphinx-site",
            "sphinx": "8.2.3"
          }
          JSON

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
