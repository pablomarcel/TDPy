# pytest.ini
[pytest]
# Where to look for tests.
# TDPy is a root-layout project, so the main tests folder is expected at:
#
#   tests/
#
# Package-level test folders are also supported when present.
testpaths =
    tests
    equations/tests
    interpreter/tests
    thermo_props/tests

# Default options:
# -vv : very verbose test names
# -ra : show summary of skips/xfails
# --durations=10 : slowest 10 tests
# --cov=. : measure coverage for the root-layout TDPy project
addopts =
    -vv
    -ra
    --durations=10
    --color=yes
    --cov=.
    --cov-report=term-missing
    -o console_output_style=classic
    -o faulthandler_timeout=60

# Live logging to console. Use logging.* in tests.
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Make xfail strict so accidental passes are flagged.
xfail_strict = true

# Register custom markers.
markers =
    cf: closed-form / symbolic tests
    symbolic: tests requiring SymPy
    slow: slow-running tests
    batch: batch job tests
    gui: tests involving Dear PyGui or GUI behavior
    thermo: tests involving thermodynamic property backends
    equations: tests involving equation solving
    optimization: tests involving optimization workflows
    interpreter: tests involving text-to-spec interpretation workflows
    units: tests involving unit parsing or conversion

# Warning policy:
# - Keep TDPy's internal package deprecations strict.
# - Silence noisy third-party deprecation warnings.
# - Ignore remaining deprecation warnings as a final fallback so external
#   packages do not break day-to-day test runs.
filterwarnings =
    error::DeprecationWarning:equations\..*
    error::DeprecationWarning:interpreter\..*
    error::DeprecationWarning:thermo_props\..*

    ignore::DeprecationWarning:numpy\..*
    ignore::DeprecationWarning:scipy\..*
    ignore::DeprecationWarning:sympy\..*
    ignore::DeprecationWarning:plotly\..*
    ignore::DeprecationWarning:yaml\..*
    ignore::DeprecationWarning:dearpygui\..*
    ignore::DeprecationWarning:CoolProp\..*
    ignore::DeprecationWarning:cantera\..*
    ignore::DeprecationWarning:gekko\..*

    ignore::DeprecationWarning
